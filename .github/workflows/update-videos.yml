name: Update Videos

on:
  schedule:
    # 1時間ごとに実行 (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (Wiki を更新しない)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      batch_size:
        description: "1回の処理ライバー数"
        required: false
        default: "5"
      days_back:
        description: "取得対象の過去日数"
        required: false
        default: "14"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # data/ ファイルをコミットするため

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run update job
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WIKI_API_BASE_URL: ${{ secrets.WIKI_API_BASE_URL }}
          WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '5' }}
          DAYS_BACK: ${{ github.event.inputs.days_back || '14' }}
        run: npm run update

      - name: Commit data files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos-cache.json data/update-state.json
          git diff --staged --quiet || git commit -m "chore: update video cache and state [skip ci]"
          git push
